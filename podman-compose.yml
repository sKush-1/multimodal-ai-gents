services:
  redis:
    image: redis/redis-stack:latest
    container_name: multiagent-redis
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_ARGS=--requirepass redis_password
    restart: unless-stopped
    networks:
      - multiagent-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.0.0
    container_name: multiagent-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    restart: unless-stopped
    networks:
      - multiagent-network

volumes:
  redis_data:
    driver: local
  elasticsearch_data:
    driver: local

networks:
  multiagent-network:
    driver: bridge